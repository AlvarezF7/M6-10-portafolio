<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/styles.css">
    <title>Go-Art</title>
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <h2 class="navbar-brand" href="#">Go-Art</h2>
                <button id="btnBurger"class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                        <a class="nav-link" href="#">About</a>
                        <a class="nav-link" href="#">contact</a>         
                    </div>
                     <!-- btn login register and carrito-->      
                <div class="ms-auto">   
                   <!-- <span id="usuarioLogueado"></span>
                  <button  class="btn btn-outline-primary" type="button" data-bs-toggle ="modal" data-bs-target="#loginModal">Login</button> 
                    <button id="btnCerrarSession" class="btn btn-outline-primary"> <i class="bi bi-person-dash"></i></button> -->
                    <button id="btnCarrito" class="btn btn-warning position-relative" type="button" data-bs-toggle ="offcanvas" data-bs-target="#containerCarrito" aria-controls="offcanvasRight">
                        <img src="./img/iconcar.png"  alt="carrito" class="img-fluid" style="width: 25px; height: 25px;">
                    </button>
                    
                    <div id="contenedorCarrito" class="d-none"></div>
                </div>
                </div>
            </div>
        </nav>
        <div id="banner" class="text-center my-">
            <h2> Go-Art </h2>
            <p>Bienvenido a Go-Art tu tienda de suministros favorita!!</p>
    </header>
   <main>
    <div class="cardContainer" id="cardMuestra" >
       <!-- Contiene las tarjetas de productos--> 
      </div>
      <!----------- Carrito--------->
      <div class="offcanvas offcanvas-end " tabindex="-1" id="containerCarrito" aria-labelledby="offcanvasRightLabel">
        <div class="offcanvas-header">
          <h5 class="offcanvas-title" id="offcanvasLabel">Tienes  Productos</h5>
          <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body" id="offCanvasCarrito">
          <table id="carritoTable" class="table table-hover">
            <thead>
              <tr>
                <th scope="col">Producto</th>
                <th scope="col">Cantidad</th>
                <th scope="col">P. Unitario</th>
                <th scope="col">SubTotal</th>
              </tr>
            </thead>
          <tbody id="carritoBody">
            <!-- filas dinamicas-->
          </tbody> 
        </table>
        <br><br>
        <!-- resumen carrito-->
        <section class="mt-3" id="totalCarrito">
          <p id="subtotal"></p>
          <p id="iva"><strong></strong></p>
          <p id="total"><strong></strong></p>
          <button class="btn btn-primary w-100">Comprar</button>
        </section> 
            </div>
          </div>
      </div>  
      <!--modal comprobate de compra-->
    <div class="modal fade" id="modalResumen" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Resumen de Compra</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body" id="modalResumenBody"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-primary" data-bs-dismiss="modal"id="cerrarModal">Volver a Productos</button>
          </div>
        </div>
      </div>
</div>
    </main>     
    
<!---------------------footer----------------------------->
   <footer id="foo">
       <p> Siguenos</p>
        <div class="social-icon">       
            <img class="iconSo" src="./img/instagram.png" alt="instaLogo">
            <img class="iconSo" src="./img/wsp4.png" alt="wspLogo">
            <img class="iconSo" src="./img/faceb.png" alt="faceLogo">
            <img class="iconSo" src="./img/you.png" alt="youLogo">
        </div>
        <p>&copy; Go-Art todos los derechos reservados 2026</p>
    </footer> 


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./app.js"></script>
</body>
</html>
